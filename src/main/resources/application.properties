# ============================================================
# ORDER MONITOR – APPLICATION CONFIGURATION
# ============================================================
spring.application.name=order-monitor
server.port=${PORT:8080}

# ============================================================
# POSTGRESQL / NEONDB DATASOURCE
# ============================================================
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP connection pool (tuned for NeonDB free tier)
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# ============================================================
# JPA / HIBERNATE
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ============================================================
# THYMELEAF
# ============================================================
spring.thymeleaf.cache=false
spring.thymeleaf.suffix=.html

# ============================================================
# GMAIL SMTP – sender: online.monitor.apt@gmail.com
# ============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.starttls.required=false
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ============================================================
# ASYNC (used for email sending)
# ============================================================
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
spring.task.execution.pool.queue-capacity=100

# ============================================================
# LOGGING
# ============================================================
logging.level.com.ordermonitor=INFO
logging.level.org.springframework.web.socket=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{30} - %msg%n
logging.level.org.springframework.mail=DEBUG