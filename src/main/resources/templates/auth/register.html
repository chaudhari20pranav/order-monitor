<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – Order Monitor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link th:href="@{/css/auth.css}" rel="stylesheet"/>
</head>
<body class="auth-body">

<div class="auth-bg">
  <div class="auth-card-wrapper">
    <div class="auth-card" style="max-width:480px;">

      <div class="auth-logo">
        <div class="logo-icon"><i class="fas fa-chart-line"></i></div>
        <div>
          <h1 class="logo-title">OrderMonitor</h1>
          <p class="logo-subtitle">Real-Time Trade Platform</p>
        </div>
      </div>

      <h2 class="auth-heading">Create Account</h2>
      <p class="auth-subheading">Join the platform</p>

      <div th:if="${errorMsg}" class="alert-error-custom" th:text="${errorMsg}"></div>

      <form th:action="@{/register}" th:object="${registerRequest}" method="post">

        <div class="form-group-custom">
          <label class="form-label-custom"><i class="fas fa-user me-2"></i>Full Name</label>
          <input type="text" th:field="*{fullName}" class="form-control-custom"
                 placeholder="John Doe" required/>
          <span th:if="${#fields.hasErrors('fullName')}" class="field-error" th:errors="*{fullName}"></span>
        </div>

        <div class="form-group-custom">
          <label class="form-label-custom"><i class="fas fa-envelope me-2"></i>Email Address</label>
          <input type="email" th:field="*{email}" class="form-control-custom"
                 placeholder="you@example.com" required/>
          <span th:if="${#fields.hasErrors('email')}" class="field-error" th:errors="*{email}"></span>
        </div>

        <div class="form-group-custom">
          <label class="form-label-custom"><i class="fas fa-lock me-2"></i>Password</label>
          <div class="input-eye-wrapper">
            <input type="password" th:field="*{password}" class="form-control-custom"
                   id="passwordInput" placeholder="Minimum 6 characters" required/>
            <button type="button" class="eye-btn" onclick="togglePassword()">
              <i class="fas fa-eye" id="eyeIcon"></i>
            </button>
          </div>
          <span th:if="${#fields.hasErrors('password')}" class="field-error" th:errors="*{password}"></span>
        </div>

        <div class="form-group-custom">
          <label class="form-label-custom"><i class="fas fa-id-badge me-2"></i>Role</label>
          <div class="role-selector">
            <label class="role-option">
              <input type="radio" th:field="*{role}" value="SUBSCRIBER" required/>
              <div class="role-card">
                <i class="fas fa-user-tie"></i>
                <span>Subscriber</span>
                <small>Place & track orders</small>
              </div>
            </label>
            <label class="role-option">
              <input type="radio" th:field="*{role}" value="ADMIN"/>
              <div class="role-card">
                <i class="fas fa-shield-alt"></i>
                <span>Admin</span>
                <small>Manage all orders</small>
              </div>
            </label>
          </div>
          <span th:if="${#fields.hasErrors('role')}" class="field-error" th:errors="*{role}"></span>
        </div>

        <button type="submit" class="btn-auth">
          <i class="fas fa-user-plus me-2"></i>Create Account
        </button>
      </form>

      <div class="auth-footer">
        <p>Already have an account?
          <a th:href="@{/login}" class="auth-link">Sign In</a>
        </p>
      </div>
    </div>
  </div>
</div>

<script>
  function togglePassword() {
    const input = document.getElementById('passwordInput');
    const icon = document.getElementById('eyeIcon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
      input.type = 'password';
      icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
  }

  // Highlight selected role card
  document.querySelectorAll('.role-option input').forEach(radio => {
    radio.addEventListener('change', () => {
      document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
      radio.nextElementSibling.classList.add('selected');
    });
  });
</script>
</body>
</html>
